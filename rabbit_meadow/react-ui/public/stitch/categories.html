<script>
    (function () {
        function send(type, payload) {
            window.parent.postMessage(
                Object.assign({ source: 'stitch-frame', type: type }, payload || {}),
                window.location.origin,
            );
        }

        function bindLink(link, to) {
            if (!link) return;
            link.href = to;
            link.addEventListener('click', function (event) {
                event.preventDefault();
                send('navigate', { to: to });
            });
        }

        var navLinks = document.querySelectorAll('nav a');
        var navRoutes = ['/home', '/categories', '/orders', '/cart', '/orders'];
        navLinks.forEach(function (link, index) {
            if (navRoutes[index]) {
                bindLink(link, navRoutes[index]);
            }
        });

        var cards = document.querySelectorAll('main .grid > div');
        cards.forEach(function (card) {
            card.style.cursor = 'pointer';
            card.addEventListener('click', function () {
                send('navigate', { to: '/category-products' });
            });
        });
    })();
</script>
