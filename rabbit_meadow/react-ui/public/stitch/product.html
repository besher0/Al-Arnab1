<!DOCTYPE html>

<style>

        }

        }

            font-weight: 900;
            font-style: italic;
        }
    </style>
    <style>
        html,
        body {
          overflow-y: auto;
          scrollbar-width: none;
          -ms-overflow-style: none;
        }

        body::-webkit-scrollbar {
          width: 0;
          height: 0;

</head>
<body class="text-on-surface bg-background min-h-screen">
<!-- Top AppBar -->
<header class="fixed top-0 w-full z-50 bg-white/90 backdrop-blur-md flex justify-between items-center px-6 py-4 border-b border-primary/10">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-primary flex items-center justify-center text-white shadow-sm">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">pets</span>
</div>
<h1 class="text-on-surface font-['Tajawal'] font-bold text-2xl tracking-tight">الأرنب</h1>
</div>
<div class="flex items-center gap-4">
<button class="text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined">notifications</span>
</button>
<div class="w-10 h-10 rounded-full border-2 border-primary/20 overflow-hidden bg-white">
<img alt="User" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD8-KCZD4q-h8glh373n4RV6NiMumNElo94iFIlFvR4snOGFDr-o2yu_8sSgJouJ3kBoq9ieH4mjmH_IF8OyeazWvYbhwehE__ingvwizVL0fcpMz1LwOPd64u83qS_NxnkZjNkj7Ud5Sivt5zit4inaKacNRKdph6eg_DxZ_MVMn2TBv0RLKB7FcSHrg-aQT8cCE2zdqF7gOOOX84G9cOfy5YhXhJX8KkfIvi7gVQQweIH6K9UIoPC08brjHtNChh1D99tXLJDxvH2"/>
</div>
</div>
</header>
<main class="pt-24 pb-64">
<!-- Hero Section: Large Product Image -->
<div class="w-full aspect-square relative">
<img alt="طماطم كرزية حمراء" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDf9MJeVFPP9pMzvyD2_1KEauuqKB25Nm9kjENaBe0gJZPdtmkA4uR_Ux4ME62LVKD9T5DxMhicYkmCxgcvCsAJpfcISa6gVzBkUJVdnN6gl6zOO0UcCh90U1pzvF82xfgY6NzMAIjSYXChLOdA-BDw92lnxJz4QSeNZ-TpknjjCL871OSlDEQI4Dpol-H6W9X1C6lUMvT9opoRiCTjeyI-R7tmIaJA24gtrlSBrjVX7WvMbQybSBBm9yb6YE24V3wAWUTIi5s4ECgc"/>
<button class="absolute top-6 right-6 bg-white/80 backdrop-blur-md w-10 h-10 rounded-full flex items-center justify-center text-on-surface active:scale-90 transition-transform shadow-sm">
<span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
<!-- Product Content -->
<div class="mt-8 px-6 text-center">
<h1 class="font-headline text-4xl font-black text-on-surface tracking-tight">طماطم كرزية حمراء</h1>
<p class="font-body text-on-surface-variant mt-2 text-lg">مزارع القصيم المحلية</p>
<div class="mt-6 inline-block bg-surface px-6 py-3 rounded-2xl">
<span class="font-headline text-3xl font-bold text-on-surface">١٤.٥٠ ر.س</span>
</div>
</div>
</main>
<!-- Simplified Bottom Bar -->
<div class="product-action-bar fixed bottom-24 left-0 w-full bg-white border-t border-secondary p-3 flex flex-col gap-2 z-40 shadow-[0_-4px_20px_rgba(0,0,0,0.05)]">
<!-- Prominent Quantity Selector -->
<div class="flex items-center justify-between bg-surface rounded-full p-1.5 h-12 w-full">
<button class="w-9 h-9 bg-white rounded-full flex items-center justify-center text-primary shadow-sm active:scale-90 transition-transform">
<span class="material-symbols-outlined font-bold">add</span>
</button>
<span class="font-headline font-bold text-lg text-on-surface">١</span>
<button class="w-9 h-9 bg-white rounded-full flex items-center justify-center text-primary shadow-sm active:scale-90 transition-transform">
<span class="material-symbols-outlined font-bold">remove</span>
</button>
</div>
<!-- Large Add to Cart Button -->
<button class="w-full bg-primary text-on-primary h-12 rounded-full flex items-center justify-center gap-2 font-headline font-bold text-base shadow-lg active:scale-[0.98] transition-all">
<span class="material-symbols-outlined">shopping_cart</span>
            أضف للسلة
        </button>
</div>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full bg-white/90 backdrop-blur-xl flex justify-around items-center px-2 pt-3 pb-6 rounded-t-[3rem] z-50 shadow-[0_-4px_32px_rgba(0,0,0,0.05)]">
<a class="flex flex-col items-center justify-center text-slate-500 p-2 hover:opacity-80 transition-opacity" href="#">
<span class="material-symbols-outlined" data-icon="home">home</span>
<span class="font-label text-[11px] font-semibold mt-1">الرئيسية</span>
</a>
<a class="flex flex-col items-center justify-center bg-[#87CEEB] text-white rounded-[24px] px-5 py-2" href="#">
<span class="material-symbols-outlined" data-icon="grid_view" data-weight="fill" style="font-variation-settings: 'FILL' 1;">grid_view</span>
<span class="font-label text-[11px] font-semibold mt-1">الأقسام</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-500 p-2 hover:opacity-80 transition-opacity" href="#">
<span class="material-symbols-outlined" data-icon="receipt_long">receipt_long</span>
<span class="font-label text-[11px] font-semibold mt-1">طلباتي</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-500 p-2 hover:opacity-80 transition-opacity" href="#">
<div class="relative">
<span class="material-symbols-outlined" data-icon="shopping_cart">shopping_cart</span>
<span class="cart-badge absolute -top-2 -right-2 bg-red-500 text-white text-[9px] min-w-[16px] h-4 px-1 rounded-full border-2 border-white hidden items-center justify-center leading-none">٠</span>
</div>
<span class="font-label text-[11px] font-semibold mt-1">السلة</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-500 p-2 hover:opacity-80 transition-opacity" href="#">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-label text-[11px] font-semibold mt-1">حسابي</span>
</a>
</nav>
<script>
  (function () {
    function toArabicNumber(value) {
      var map = ['٠', '١', '٢', '٣', '٤', '٥', '٦', '٧', '٨', '٩'];
      return String(value).replace(/[0-9]/g, function (digit) {
        return map[Number(digit)] || digit;
      });
    }

    function setCartCount(count) {
      var badge = document.querySelector('header button .absolute');
      if (!badge) return;

      var next = Math.max(0, Number(count) || 0);
      badge.textContent = toArabicNumber(next);
      badge.style.display = next > 0 ? 'flex' : 'none';
    }

    function setFooterCartCount(count) {
      var next = Math.max(0, Number(count) || 0);
      var badges = document.querySelectorAll('.cart-badge');
      badges.forEach(function (badge) {
        badge.textContent = toArabicNumber(next);
        badge.style.display = next > 0 ? 'flex' : 'none';
      });
    }

    function send(type, payload) {
      window.parent.postMessage(
        Object.assign({ source: 'stitch-frame', type: type }, payload || {}),
        window.location.origin,
      );
    }

    function bindLink(link, to) {
      if (!link) return;
      link.href = to;
      link.addEventListener('click', function (event) {
        event.preventDefault();
        send('navigate', { to: to });
      });
    }

    function parseArabicNumber(value) {
      var map = { '٠': '0', '١': '1', '٢': '2', '٣': '3', '٤': '4', '٥': '5', '٦': '6', '٧': '7', '٨': '8', '٩': '9' };
      var normalized = (value || '').replace(/[٠-٩]/g, function (digit) {
        return map[digit] || digit;
      });
      var parsed = parseInt(normalized, 10);
      return Number.isNaN(parsed) ? 1 : parsed;
    }

    function toArabicNumber(value) {
      var map = ['٠', '١', '٢', '٣', '٤', '٥', '٦', '٧', '٨', '٩'];
      return String(value).replace(/[0-9]/g, function (digit) {
        return map[Number(digit)] || digit;
      });
    }

    var navLinks = document.querySelectorAll('nav a');
    var navRoutes = ['/home', '/categories', '/orders', '/cart', '/orders'];
    navLinks.forEach(function (link, index) {
      if (navRoutes[index]) {
        bindLink(link, navRoutes[index]);
      }
    });

    var qtyNode = document.querySelector('.product-action-bar span.font-headline');
    var qty = parseArabicNumber(qtyNode ? qtyNode.textContent : '1');

    var bottomButtons = document.querySelectorAll('.product-action-bar button');
    var plusButton = null;
    var minusButton = null;
    bottomButtons.forEach(function (button) {
      var icon = button.querySelector('.material-symbols-outlined');
      if (!icon) return;
      var text = icon.textContent.trim();
      if (text === 'add') plusButton = button;
      if (text === 'remove') minusButton = button;
    });

    if (plusButton) {
      plusButton.addEventListener('click', function () {
        qty += 1;
        if (qtyNode) qtyNode.textContent = toArabicNumber(qty);
      });
    }

    if (minusButton) {
      minusButton.addEventListener('click', function () {
        qty = Math.max(1, qty - 1);
        if (qtyNode) qtyNode.textContent = toArabicNumber(qty);
      });
    }

    var addButton = Array.from(document.querySelectorAll('button')).find(function (button) {
      return (button.textContent || '').indexOf('أضف للسلة') !== -1;
    });
    if (addButton) {
      addButton.addEventListener('click', function () {
        send('add-item', { id: 'tomato', qty: qty });
        send('navigate', { to: '/cart' });
      });
    }

    var backButton = Array.from(document.querySelectorAll('button')).find(function (button) {
      var icon = button.querySelector('.material-symbols-outlined');
      return icon && icon.textContent.trim() === 'arrow_forward';
    });
    if (backButton) {
      backButton.addEventListener('click', function () {
        send('navigate', { to: '/category-products' });
      });
    }

    window.addEventListener('message', function (event) {
      if (event.origin !== window.location.origin) return;
      var payload = event.data;
      if (!payload || payload.source !== 'react-shell') return;
      if (payload.type !== 'cart-state') return;

      setCartCount(payload.itemCount || 0);
      setFooterCartCount(payload.itemCount || 0);
    });

    send('request-state');
  })();
</script>
</body></html>
