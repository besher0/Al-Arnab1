<!DOCTYPE html>

<html dir="rtl" lang="ar"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&amp;family=Almarai:wght@300;400;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "primary": "#87CEEB",
                      "on-primary": "#FFFFFF",
                      "background": "#F0F8FF",
                      "surface": "#FFFFFF",
                      "on-background": "#1A365D",
                      "on-surface": "#1A365D",
                      "on-surface-variant": "#718096",
                      "secondary": "#FF6B6B",
                      "outline-variant": "#E2E8F0"
              },
              "borderRadius": {
                      "DEFAULT": "1rem",
                      "lg": "2rem",
                      "xl": "3rem",
                      "full": "9999px"
              },
              "fontFamily": {
                      "headline": ["Tajawal", "sans-serif"],
                      "body": ["Almarai", "sans-serif"],
                      "label": ["Almarai", "sans-serif"]
              }
            },
          },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Almarai', sans-serif;
            background-color: #F0F8FF;
        }
        h1, h2, h3, .headline {
            font-family: 'Tajawal', sans-serif;
        }
        .blue-gradient {
            background: linear-gradient(135deg, #87CEEB 0%, #5CACEE 100%);
        }
    </style>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Almarai', sans-serif;
            background-color: #F0F8FF;
        }
        h1, h2, h3, .headline {
            font-family: 'Tajawal', sans-serif;
        }
        .blue-gradient {
            background: linear-gradient(135deg, #87CEEB 0%, #5CACEE 100%);
        }
    </style>
</head>
<body class="text-on-background min-h-screen flex flex-col items-center justify-center p-4 bg-background">
<!-- Top decorative element representing "The Organic Grove" -->
<div class="fixed -top-20 -right-20 w-64 h-64 bg-primary/10 rounded-full blur-3xl"></div>
<div class="fixed -bottom-20 -left-20 w-80 h-80 bg-primary/20 rounded-full blur-3xl"></div>
<div class="w-full max-w-md relative z-10">
<!-- Logo Section -->
<div class="flex flex-col items-center mb-10">
<div class="w-24 h-24 bg-surface-container-lowest rounded-xl shadow-sm flex items-center justify-center mb-4 overflow-hidden transform rotate-3">
<div class="bg-primary-container w-16 h-16 rounded-full flex items-center justify-center"><span class="material-symbols-outlined text-primary text-4xl" data-icon="cruelty_free">cruelty_free</span></div>
</div>
<h1 class="text-4xl font-black italic tracking-tight text-primary">Al-Arnab</h1>
<p class="text-on-surface-variant font-medium mt-2">عالم طازج بين يديك</p>
</div>
<!-- Login Card -->
<div class="bg-surface-container-lowest p-8 rounded-xl shadow-[0_4px_32px_rgba(11,54,29,0.06)] relative overflow-hidden">
<!-- Decorative Carrot Accent -->
<div class="absolute -top-4 -left-4 opacity-10">
<span class="material-symbols-outlined text-secondary text-8xl" data-icon="nutrition">nutrition</span>
</div>
<div class="relative z-10">
<h2 class="text-2xl font-bold text-on-background mb-1">تسجيل دخول المستخدم</h2>
<p class="text-on-surface-variant text-sm mb-8">أهلاً بك مجدداً في عائلة الأرنب</p>
<form class="space-y-5">
<!-- Email/Phone Field -->
<div class="space-y-1.5">
<label class="text-sm font-bold text-on-surface-variant pr-1">رقم الهاتف</label>
<div class="relative">
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-tertiary text-lg" data-icon="call">call</span>
<input class="w-full bg-surface-container-low border-none rounded-full py-4 pr-12 pl-4 focus:ring-2 focus:ring-primary/20 text-on-background placeholder:text-on-surface-variant/50 transition-all" placeholder="05xxxxxxxx" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-1.5">
<label class="text-sm font-bold text-on-surface-variant pr-1">كلمة المرور</label>
<div class="relative">
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-primary text-lg" data-icon="lock">lock</span>
<input class="w-full bg-surface-container-low border-none rounded-full py-4 pr-12 pl-4 focus:ring-2 focus:ring-primary/20 text-on-background placeholder:text-on-surface-variant/50 transition-all" placeholder="••••••••" type="password"/>
<button class="absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant/60" type="button">
<span class="material-symbols-outlined text-sm" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Forgot Password Link -->
<div class="flex justify-end">
<a class="text-sm font-bold text-primary hover:text-blue-700 transition-colors" href="#">نسيت كلمة المرور؟</a>
</div>
<!-- Login Button -->
<button class="w-full text-on-primary font-bold py-4 rounded-full shadow-lg shadow-primary/10 hover:shadow-xl hover:scale-[1.02] active:scale-95 transition-all flex items-center justify-center gap-2 blue-gradient" type="submit">
<span>تسجيل الدخول</span>
<span class="material-symbols-outlined" data-icon="login">login</span>
</button>
</form>
<!-- Social Login Divider -->
<!-- Social Login Buttons -->
</div>
</div>
<!-- Sign Up Link -->
<div class="mt-8 text-center">
<p class="text-on-surface-variant">
                ليس لديك حساب؟ 
                <a class="text-primary font-extrabold hover:underline" href="#">سجل الآن مجاناً</a>
</p>
</div>
</div>
<!-- Background Illustrative Imagery (Non-functional, purely aesthetic) -->
</body></html>
